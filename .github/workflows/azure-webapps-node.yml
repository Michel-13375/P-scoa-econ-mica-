<script>
// Contagem regressiva
const countdownDate = new Date("Mar 31, 2026 23:59:59").getTime();
const countdownEl = document.getElementById("countdown");
function updateCountdown() {
  const now = new Date().getTime();
  const distance = countdownDate - now;
  if (distance < 0) { countdownEl.innerHTML = "Promoções encerradas!"; return; }
  const days = Math.floor(distance / (1000*60*60*24));
  const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
  const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
  const seconds = Math.floor((distance % (1000*60)) / 1000);
  countdownEl.innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s para a Páscoa!`;
}
setInterval(updateCountdown, 1000);
updateCountdown();

// Carrinho simples
let cart = 0;
function addToCart(item) {
  cart++;
  document.getElementById("cart-count").innerText = `Carrinho: ${cart}`;
  alert(item + " adicionado ao carrinho!");
}
</script>

